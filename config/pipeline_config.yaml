# Two-Tier Safety Pipeline configuration
# ========================================
# Tier 1: Linear Probe detection during token-by-token generation
# Tier 2: LNAS Null-Space Steering for safe re-generation

# --- Model ---
model_name: meta-llama/Llama-3.1-8B-Instruct
dtype: bfloat16
device: cuda:0

# --- Tier 1: Linear Probe ---
probe_checkpoint: linear_probe/checkpoints/linear_probe_model.pt
ema_alpha: 0.1
threshold: 0.5
warmup_tokens: 2        # skip first N generated tokens to avoid FP

# --- Tier 2: LNAS Steering ---
steering_matrix: data/steering_matrix/steering_matrix_llama3.1.pt
steering_strength: -0.3
steering_layers: "8,9,10,11,12,13,14,16,18,19"

# --- Generation ---
max_new_tokens: 256
temperature: 0.0         # greedy decoding
